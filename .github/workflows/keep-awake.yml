name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */11 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: curl -fsS --retry 3 --retry-delay 10 --retry-max-time 120 "https:///transcriber-tube.streamlit.app/?embed=true" > /dev/null
